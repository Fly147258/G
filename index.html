<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校园电脑维修服务</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
/* ========================================
   校园电脑维修服务 - 移动端优化版
   ======================================== */

/* CSS变量 */
:root {
    --primary: #4F46E5;
    --primary-dark: #4338CA;
    --primary-light: #818CF8;
    --secondary: #10B981;
    --accent: #F59E0B;
    --danger: #EF4444;
    --warning: #F59E0B;
    --info: #3B82F6;
    
    --bg-primary: #F8FAFC;
    --bg-secondary: #FFFFFF;
    --bg-dark: #1E293B;
    
    --text-primary: #1E293B;
    --text-secondary: #64748B;
    --text-light: #94A3B8;
    --text-white: #FFFFFF;
    
    --border-color: #E2E8F0;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    
    --radius-sm: 0.375rem;
    --radius: 0.5rem;
    --radius-lg: 1rem;
    --radius-xl: 1.5rem;
    
    --transition-fast: 0.15s ease;
    --transition: 0.3s ease;
    --transition-slow: 0.5s ease;
}

/* 基础样式重置 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
}

/* 加载动画 */
.loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.5s ease, visibility 0.5s ease;
}

.loader.hidden {
    opacity: 0;
    visibility: hidden;
}

.loader-content {
    text-align: center;
    color: var(--text-white);
}

.loader-content i {
    font-size: 3rem;
    margin-bottom: 1rem;
    animation: loaderBounce 1s ease-in-out infinite;
}

.loader-content p {
    font-size: 1rem;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes loaderBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* 底部导航栏 - 移动端专用 */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: var(--bg-secondary);
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 1000;
    padding: 0 0.5rem;
    padding-bottom: env(safe-area-inset-bottom);
}

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 16px;
    color: var(--text-secondary);
    text-decoration: none;
    border-radius: var(--radius);
    transition: all var(--transition);
    position: relative;
}

.nav-item i {
    font-size: 1.25rem;
    transition: all var(--transition);
}

.nav-item span {
    font-size: 0.7rem;
    font-weight: 500;
}

.nav-item.active {
    color: var(--primary);
}

.nav-item.active i {
    transform: scale(1.1);
    animation: navIconPop 0.3s ease;
}

.nav-item::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    width: 0;
    height: 3px;
    background: var(--primary);
    transform: translateX(-50%);
    border-radius: 0 0 3px 3px;
    transition: width var(--transition);
}

.nav-item.active::after {
    width: 70%;
}

@keyframes navIconPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1.1); }
}

/* 汉堡菜单按钮 */
.menu-toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 44px;
    height: 44px;
    background: var(--primary);
    border: none;
    border-radius: 50%;
    color: var(--text-white);
    font-size: 1.25rem;
    cursor: pointer;
    z-index: 1001;
    box-shadow: var(--shadow-lg);
    transition: all var(--transition);
    display: flex;
    justify-content: center;
    align-items: center;
}

.menu-toggle:active {
    transform: scale(0.95);
}

.menu-toggle i {
    transition: transform var(--transition);
}

.menu-toggle.active i {
    transform: rotate(90deg);
}

/* 侧边菜单 */
.side-menu {
    position: fixed;
    top: 0;
    right: 0;
    width: 280px;
    height: 100%;
    background: var(--bg-secondary);
    z-index: 1002;
    transform: translateX(100%);
    transition: transform var(--transition);
    box-shadow: var(--shadow-xl);
    padding-top: 70px;
}

.side-menu.active {
    transform: translateX(0);
}

.side-menu-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1001;
    opacity: 0;
    visibility: hidden;
    transition: all var(--transition);
}

.side-menu-overlay.active {
    opacity: 1;
    visibility: visible;
}

.side-menu-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 1rem;
}

.side-menu-header i {
    font-size: 2rem;
    color: var(--primary);
}

.side-menu-header span {
    font-size: 1.1rem;
    font-weight: 600;
}

.side-menu-link {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.5rem;
    color: var(--text-primary);
    text-decoration: none;
    border-bottom: 1px solid var(--border-color);
    transition: all var(--transition);
}

.side-menu-link:hover,
.side-menu-link:active {
    background: var(--bg-primary);
    color: var(--primary);
}

.side-menu-link i {
    width: 24px;
    font-size: 1.1rem;
}

.side-menu-divider {
    height: 8px;
    background: var(--bg-primary);
}

.side-menu-footer {
    padding: 1rem 1.5rem;
    margin-top: auto;
}

/* 头部区域 */
.header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    padding: 2rem 1rem 1rem;
    color: var(--text-white);
    position: relative;
    overflow: hidden;
}

.header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 200px;
    height: 200px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    animation: float 6s ease-in-out infinite;
}

.header::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -20%;
    width: 150px;
    height: 150px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 50%;
    animation: float 8s ease-in-out infinite reverse;
}

@keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
}

.header-content {
    position: relative;
    z-index: 1;
}

.header h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    animation: fadeInUp 0.6s ease;
}

.header-subtitle {
    font-size: 0.9rem;
    opacity: 0.9;
    animation: fadeInUp 0.6s ease 0.1s backwards;
}

/* 主内容区 */
.main-content {
    padding-bottom: 80px;
    min-height: calc(100vh - 150px);
}

/* 页面切换 */
.page {
    display: none;
    animation: fadeIn 0.4s ease;
}

.page.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInRight {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}

/* 快捷入口卡片 */
.quick-actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    padding: 1rem;
    margin-top: -2rem;
    position: relative;
    z-index: 10;
}

.quick-action-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1rem 0.5rem;
    text-align: center;
    box-shadow: var(--shadow);
    transition: all var(--transition);
    text-decoration: none;
    animation: fadeInUp 0.5s ease backwards;
}

.quick-action-card:nth-child(1) { animation-delay: 0.1s; }
.quick-action-card:nth-child(2) { animation-delay: 0.2s; }
.quick-action-card:nth-child(3) { animation-delay: 0.3s; }

.quick-action-card:active {
    transform: scale(0.97);
}

.quick-action-card i {
    font-size: 1.5rem;
    color: var(--primary);
    margin-bottom: 0.5rem;
    display: block;
    animation: iconPulse 2s ease-in-out infinite;
}

@keyframes iconPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
}

.quick-action-card span {
    font-size: 0.8rem;
    color: var(--text-primary);
    font-weight: 500;
}

/* 特色服务 */
.section {
    padding: 1.5rem 1rem;
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
}

.section-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-primary);
}

.section-more {
    font-size: 0.85rem;
    color: var(--primary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.25rem;
}

.services-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}

.service-item {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1rem;
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: all var(--transition);
    border-left: 4px solid var(--primary);
    animation: slideInRight 0.4s ease backwards;
}

.service-item:nth-child(1) { animation-delay: 0.1s; }
.service-item:nth-child(2) { animation-delay: 0.15s; }
.service-item:nth-child(3) { animation-delay: 0.2s; }
.service-item:nth-child(4) { animation-delay: 0.25s; }

@keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}

.service-item:active {
    transform: scale(0.98);
    box-shadow: var(--shadow);
}

.service-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
    border-radius: var(--radius);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    transition: transform var(--transition);
}

.service-item:active .service-icon {
    transform: rotate(10deg) scale(1.1);
}

.service-icon i {
    font-size: 1.25rem;
    color: var(--text-white);
}

.service-info {
    flex: 1;
    min-width: 0;
}

.service-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 0.25rem;
}

.service-desc {
    font-size: 0.8rem;
    color: var(--text-secondary);
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.service-price {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary);
    flex-shrink: 0;
}

/* 统计卡片 */
.stats-card {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin: 0 1rem;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    box-shadow: var(--shadow-lg);
}

.stat-item {
    text-align: center;
    color: var(--text-white);
    animation: fadeInUp 0.5s ease backwards;
}

.stat-item:nth-child(1) { animation-delay: 0.1s; }
.stat-item:nth-child(2) { animation-delay: 0.2s; }
.stat-item:nth-child(3) { animation-delay: 0.3s; }
.stat-item:nth-child(4) { animation-delay: 0.4s; }

.stat-number {
    font-size: 1.75rem;
    font-weight: 700;
    display: block;
    line-height: 1.2;
}

.stat-label {
    font-size: 0.75rem;
    opacity: 0.9;
}

/* 页面头部 (其他页面) */
.page-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    padding: 1.5rem 1rem;
    color: var(--text-white);
    display: flex;
    align-items: center;
    gap: 1rem;
}

.back-btn {
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    border-radius: 50%;
    color: var(--text-white);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all var(--transition);
}

.back-btn:active {
    transform: scale(0.9);
}

.page-header h1 {
    font-size: 1.25rem;
}

.page-header p {
    font-size: 0.85rem;
    opacity: 0.9;
    margin-top: 0.25rem;
}

/* 表单容器 */
.form-section {
    padding: 1rem;
}

.form-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    box-shadow: var(--shadow-sm);
}

.form-group {
    margin-bottom: 1rem;
}

.form-group label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
}

.form-group label i {
    color: var(--primary);
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 0.875rem 1rem;
    border: 2px solid var(--border-color);
    border-radius: var(--radius);
    font-size: 1rem;
    transition: all var(--transition);
    font-family: inherit;
    background: var(--bg-secondary);
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    animation: inputPulse 0.3s ease;
}

@keyframes inputPulse {
    0% { box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
    50% { box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.15); }
    100% { box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
}

/* 按钮样式 */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.875rem 1.5rem;
    font-size: 1rem;
    font-weight: 600;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all var(--transition);
    text-decoration: none;
    width: 100%;
    touch-action: manipulation;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: var(--text-white);
    box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
}

.btn-primary:active {
    transform: scale(0.98);
    box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
}

.btn-outline {
    background: transparent;
    border: 2px solid var(--primary);
    color: var(--primary);
}

.btn-outline:active {
    background: var(--primary);
    color: var(--text-white);
}

/* 搜索框 */
.search-box {
    display: flex;
    gap: 0.75rem;
    background: var(--bg-secondary);
    padding: 0.5rem;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    margin-bottom: 1rem;
}

.search-box input {
    flex: 1;
    padding: 0.75rem 1rem;
    border: none;
    font-size: 1rem;
    background: transparent;
}

.search-box input:focus {
    outline: none;
}

.search-box .btn {
    width: auto;
    padding: 0.75rem 1.25rem;
}

/* 状态卡片 */
.status-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 1rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow-sm);
    border-left: 4px solid var(--primary);
    animation: fadeInUp 0.4s ease;
}

.status-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border-color);
}

.status-card-header h3 {
    font-size: 0.95rem;
    color: var(--text-primary);
}

.status-badge {
    padding: 0.35rem 0.75rem;
    border-radius: 2rem;
    font-size: 0.75rem;
    font-weight: 600;
}

.status-badge.pending {
    background: #FEF3C7;
    color: #92400E;
}

.status-badge.processing {
    background: #DBEAFE;
    color: #1E40AF;
}

.status-badge.completed {
    background: #D1FAE5;
    color: #065F46;
}

.status-badge.cancelled {
    background: #FEE2E2;
    color: #991B1B;
}

.status-detail {
    display: flex;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-bottom: 1px dashed var(--border-color);
}

.status-detail:last-child {
    border-bottom: none;
}

.status-detail label {
    font-size: 0.85rem;
    color: var(--text-secondary);
}

.status-detail span {
    font-size: 0.85rem;
    color: var(--text-primary);
    font-weight: 500;
}

/* 进度条 */
.progress-container {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
}

.progress-steps {
    display: flex;
    justify-content: space-between;
    position: relative;
}

.progress-steps::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 10%;
    right: 10%;
    height: 3px;
    background: var(--border-color);
    z-index: 0;
}

.progress-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    z-index: 1;
}

.step-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg-secondary);
    border: 3px solid var(--border-color);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 0.7rem;
    transition: all var(--transition);
}

.progress-step.active .step-circle {
    border-color: var(--primary);
    background: var(--primary);
    color: var(--text-white);
    animation: stepPulse 1.5s ease-in-out infinite;
}

@keyframes stepPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.4); }
    50% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(79, 70, 229, 0); }
}

.progress-step.completed .step-circle {
    border-color: var(--secondary);
    background: var(--secondary);
    color: var(--text-white);
}

.step-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
}

.progress-step.active .step-label,
.progress-step.completed .step-label {
    color: var(--text-primary);
    font-weight: 600;
}

/* 模态框 */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    z-index: 2000;
    opacity: 0;
    visibility: hidden;
    transition: all var(--transition);
}

.modal.active {
    opacity: 1;
    visibility: visible;
}

.modal-content {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    width: 100%;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform var(--transition);
}

.modal.active .modal-content {
    transform: translateY(0);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border-color);
    position: sticky;
    top: 0;
    background: var(--bg-secondary);
}

.modal-header h3 {
    font-size: 1.1rem;
    color: var(--text-primary);
}

.modal-close {
    width: 36px;
    height: 36px;
    background: var(--bg-primary);
    border: none;
    border-radius: 50%;
    font-size: 1rem;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all var(--transition);
}

.modal-close:active {
    transform: scale(0.9);
    background: var(--danger);
    color: var(--text-white);
}

.modal-body {
    padding: 1.25rem;
}

/* Toast消息 */
.toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--secondary);
    color: var(--text-white);
    padding: 1rem 1.5rem;
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    box-shadow: var(--shadow-xl);
    z-index: 3000;
    opacity: 0;
    transition: all var(--transition);
    max-width: 90%;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.toast.error {
    background: var(--danger);
}

.toast.warning {
    background: var(--warning);
}

.toast i {
    font-size: 1.25rem;
}

/* 空状态 */
.empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-secondary);
}

.empty-state i {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
    animation: emptyBounce 2s ease-in-out infinite;
}

@keyframes emptyBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.empty-state p {
    font-size: 1rem;
}

/* 动画 - 滚动触发 */
.animate-on-scroll {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s ease;
}

.animate-on-scroll.visible {
    opacity: 1;
    transform: translateY(0);
}

/* 数字动画 */
.stat-number {
    display: inline-block;
}

/* 触摸反馈 */
@media (hover: hover) {
    .quick-action-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
    }
    
    .service-item:hover {
        transform: translateX(5px);
        box-shadow: var(--shadow);
    }
}

/* 禁用选中文本 */
.no-select {
    user-select: none;
    -webkit-user-select: none;
}

/* 管理员页面样式 */
.admin-header {
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: var(--text-white);
}

.admin-tabs {
    display: flex;
    gap: 0.5rem;
    margin-top: 1rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.admin-tab {
    padding: 0.5rem 1rem;
    background: rgba(255, 255, 255, 0.2);
    border: none;
    border-radius: 2rem;
    color: var(--text-white);
    font-size: 0.85rem;
    white-space: nowrap;
    cursor: pointer;
    transition: all var(--transition);
}

.admin-tab.active {
    background: var(--text-white);
    color: var(--primary);
}

.admin-section {
    display: none;
    padding: 1rem;
    animation: fadeIn 0.3s ease;
}

.admin-section.active {
    display: block;
}

.admin-table {

}

.admin-table th,
.admin-table td {
    padding: 0.75rem 0.5rem;

}

.admin-table th {

.admin-table tr {

    function initNavigation() {
        // 底部导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                const page = this.dataset.page;
                navigateTo(page);
            });
        });

        // 侧边菜单
        document.querySelectorAll('.side-menu-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const page = this.dataset.page;
                if (page) {
                    navigateTo(page);
                    closeSideMenu();
                }
            });
        });

        // 管理员标签
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const section = this.dataset.admin;
                showAdminSection(section);
            });
        });
    }

    function navigateTo(page) {
        // 更新底部导航
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.toggle('active', item.dataset.page === page);
        });

        // 切换页面
        document.querySelectorAll('.page').forEach(p => {
            p.classList.remove('active');
        });
        
        const targetPage = document.getElementById(page + 'Page');
        if (targetPage) {
            targetPage.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 关闭菜单
        closeSideMenu();

        // 触发页面可见时的动画
        setTimeout(() => {
            initCountAnimation();
            initScrollAnimations();
        }, 100);
    }

    function showAdminSection(section) {
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.classList.toggle('active', tab.dataset.admin === section);
        });

        document.querySelectorAll('.admin-section').forEach(s => {
            s.classList.remove('active');
        });
        
        document.getElementById('admin' + section.charAt(0).toUpperCase() + section.slice(1)).classList.add('active');
        
        // 加载数据
        if (section === 'services') {
            loadAdminServices();
        } else if (section === 'orders') {
            loadAdminOrders();
        } else if (section === 'stats') {
            loadStats();
        }
    }

    // ========================================
    // 菜单功能
    // ========================================
    function initMenu() {
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        
        menuToggle.addEventListener('click', toggleSideMenu);
        menuOverlay.addEventListener('click', closeSideMenu);

        // 登录按钮
        document.getElementById('loginBtn').addEventListener('click', (e) => {
            e.preventDefault();
            showLoginModal('user');
            closeSideMenu();
        });

        document.getElementById('adminBtn').addEventListener('click', () => {
            closeSideMenu();
            showLoginModal('admin');
        });
    }

    function toggleSideMenu() {
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        
        menuToggle.classList.toggle('active');
        sideMenu.classList.toggle('active');
        menuOverlay.classList.toggle('active');
    }

    function closeSideMenu() {
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const menuOverlay = document.getElementById('menuOverlay');
        
        menuToggle.classList.remove('active');
        sideMenu.classList.remove('active');
        menuOverlay.classList.remove('active');
    }

    // ========================================
    // 服务项目加载
    // ========================================
    function loadServices() {
        // 首页简略列表
        const homeList = document.getElementById('homeServicesList');
        homeList.innerHTML = services.slice(0, 3).map(service => `
            <div class="service-item" onclick="selectService(${service.id})">
                <div class="service-icon">
                    <i class="fas ${service.icon}"></i>
                </div>
                <div class="service-info">
                    <div class="service-name">${service.name}</div>
                    <div class="service-desc">${service.description}</div>
                </div>
                <div class="service-price">¥${service.price}</div>
            </div>
        `).join('');

        // 完整列表
        const fullList = document.getElementById('fullServicesList');
        fullList.innerHTML = services.map(service => `
            <div class="service-item" onclick="selectService(${service.id})">
                <div class="service-icon">
                    <i class="fas ${service.icon}"></i>
                </div>
                <div class="service-info">
                    <div class="service-name">${service.name}</div>
                    <div class="service-desc">${service.description}</div>
                </div>
                <div class="service-price">¥${service.price}</div>
            </div>
        `).join('');
    }

    function loadServiceOptions() {
        const select = document.getElementById('serviceType');
        select.innerHTML = '<option value="">请选择维修项目</option>' + 
            services.map(service => `<option value="${service.id}">${service.name} - ¥${service.price}</option>`).join('');
    }

    function selectService(serviceId) {
        navigateTo('apply');
        setTimeout(() => {
            document.getElementById('serviceType').value = serviceId;
        }, 300);
    }

    // ========================================
    // 表单处理
    // ========================================
    function initForms() {
        document.getElementById('repairForm').addEventListener('submit', function(e) {
            e.preventDefault();
            submitRepairForm();
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            handleLogin();
        });

        document.getElementById('addServiceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            addService();
        });

        document.getElementById('updateStatusForm').addEventListener('submit', function(e) {
            e.preventDefault();
            updateOrderStatus();
        });
    }

    function submitRepairForm() {
        const formData = {
            studentName: document.getElementById('studentName').value,
            studentId: document.getElementById('studentId').value,
            phone: document.getElementById('phone').value,
            dormitory: document.getElementById('dormitory').value,
            serviceId: parseInt(document.getElementById('serviceType').value),
            appointmentTime: document.getElementById('appointmentTime').value,
            description: document.getElementById('description').value
        };

        const service = services.find(s => s.id === formData.serviceId);
        
        const newOrder = {
            id: 'ORD' + String(orders.length + 1).padStart(3, '0'),
            ...formData,
            serviceName: service.name,
            status: 'pending',
            price: service.price,
            adminNote: '',
            actualPrice: null
        };

        orders.push(newOrder);
        
        showToast('申请提交成功！订单号：' + newOrder.id, 'success');
        document.getElementById('repairForm').reset();
        
        setTimeout(() => {
            document.getElementById('searchStudentId').value = formData.studentId;
            searchRepairStatus();
            navigateTo('status');
        }, 1500);
    }

    // ========================================
    // 状态查询
    // ========================================
    function searchRepairStatus() {
        const studentId = document.getElementById('searchStudentId').value.trim();
        const resultsContainer = document.getElementById('statusResults');
        
        if (!studentId) {
            showToast('请输入学号', 'warning');
            return;
        }

        const studentOrders = orders.filter(o => o.studentId === studentId);
        
        if (studentOrders.length === 0) {
            resultsContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-search"></i>
                    <p>未找到相关维修记录</p>
                </div>
            `;
            return;
        }

        resultsContainer.innerHTML = studentOrders.map(order => `
            <div class="status-card">
                <div class="status-card-header">
                    <h3>订单号：${order.id}</h3>
                    <span class="status-badge ${order.status}">${getStatusText(order.status)}</span>
                </div>
                <div class="status-detail">
                    <label>服务项目</label>
                    <span>${order.serviceName}</span>
                </div>
                <div class="status-detail">
                    <label>预约时间</label>
                    <span>${order.appointmentTime}</span>
                </div>
                <div class="status-detail">
                    <label>宿舍</label>
                    <span>${order.dormitory}</span>
                </div>
                <div class="status-detail">
                    <label>费用</label>
                    <span>¥${order.actualPrice || order.price}</span>
                </div>
                ${order.adminNote ? `
                <div class="status-detail">
                    <label>备注</label>
                    <span>${order.adminNote}</span>
                </div>
                ` : ''}
                <div class="progress-container">
                    <div class="progress-steps">
                        <div class="progress-step ${getProgressClass(order.status, 'pending')}">
                            <div class="step-circle"><i class="fas fa-check"></i></div>
                            <span class="step-label">待处理</span>
                        </div>
                        <div class="progress-step ${getProgressClass(order.status, 'processing')}">
                            <div class="step-circle"><i class="fas fa-cog"></i></div>
                            <span class="step-label">处理中</span>
                        </div>
                        <div class="progress-step ${getProgressClass(order.status, 'completed')}">
                            <div class="step-circle"><i class="fas fa-check-double"></i></div>
                            <span class="step-label">已完成</span>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function getStatusText(status) {
        const statusMap = {
            pending: '待处理',
            processing: '处理中',
            completed: '已完成',
            cancelled: '已取消'
        };
        return statusMap[status] || status;
    }

    function getProgressClass(currentStatus, stepStatus) {
        const statusOrder = ['pending', 'processing', 'completed'];
        const currentIndex = statusOrder.indexOf(currentStatus);
        const stepIndex = statusOrder.indexOf(stepStatus);
        
        if (currentStatus === 'cancelled') return '';
        if (stepIndex < currentIndex) return 'completed';
        if (stepIndex === currentIndex) return 'active';
        return '';
    }

    // ========================================
    // 管理员功能
    // ========================================
    function loadAdminOrders() {
        const container = document.getElementById('adminOrdersList');
        const filter = document.getElementById('statusFilter').value;
        
        let filteredOrders = orders;
        if (filter !== 'all') {
            filteredOrders = orders.filter(o => o.status === filter);
        }
        
        if (filteredOrders.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-clipboard-list"></i>
                    <p>暂无订单</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = filteredOrders.map(order => `
            <div class="status-card">
                <div class="status-card-header">
                    <h3>${order.studentName} - ${order.id}</h3>
                    <span class="status-badge ${order.status}">${getStatusText(order.status)}</span>
                </div>
                <div class="status-detail">
                    <label>学号</label>
                    <span>${order.studentId}</span>
                </div>
                <div class="status-detail">
                    <label>服务</label>
                    <span>${order.serviceName}</span>
                </div>
                <div class="status-detail">
                    <label>宿舍</label>
                    <span>${order.dormitory}</span>
                </div>
                <div class="status-detail">
                    <label>预约</label>
                    <span>${order.appointmentTime}</span>
                </div>
                <div style="margin-top: 1rem;">
                    <button class="btn btn-primary" onclick="showUpdateStatusModal('${order.id}')" style="width: 100%;">
                        <i class="fas fa-edit"></i> 更新状态
                    </button>
                </div>
            </div>
        `).join('');
    }

    function loadAdminServices() {
        const container = document.getElementById('adminServicesList');
        container.innerHTML = services.map(service => `
            <div class="status-card">
                <div class="status-card-header">
                    <h3><i class="fas ${service.icon}"></i> ${service.name}</h3>
                    <span style="font-size: 1.1rem; font-weight: 700; color: var(--primary);">¥${service.price}</span>
                </div>
                <div class="status-detail">
                    <label>描述</label>
                    <span>${service.description}</span>
                </div>
                <div class="admin-actions" style="margin-top: 1rem;">
                    <button class="btn btn-outline" onclick="editService(${service.id})" style="flex: 1;">
                        <i class="fas fa-edit"></i> 编辑
                    </button>
                    <button class="btn btn-outline" onclick="deleteService(${service.id})" style="flex: 1; border-color: var(--danger); color: var(--danger);">
                        <i class="fas fa-trash"></i> 删除
                    </button>
                </div>
            </div>
        `).join('');
    }

    function filterOrders() {
        loadAdminOrders();
    }

    function loadStats() {
        const totalOrders = orders.length;
        const pendingOrders = orders.filter(o => o.status === 'pending').length;
        const completedOrders = orders.filter(o => o.status === 'completed').length;
        const totalRevenue = orders.filter(o => o.status === 'completed').reduce((sum, o) => sum + (o.actualPrice || o.price), 0);
        
        animateValue('totalOrders', 0, totalOrders, 800);
        animateValue('pendingOrders', 0, pendingOrders, 800);
        animateValue('completedOrders', 0, completedOrders, 800);
        animateValue('totalRevenue', 0, totalRevenue, 800);
    }

    function animateValue(elementId, start, end, duration) {
        const element = document.getElementById(elementId);
        if (!element) return;
        
        const range = end - start;
        const startTime = performance.now();
        
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const value = Math.floor(start + range * easeOutQuad(progress));
            element.textContent = value;
            
            if (progress < 1) {
                requestAnimationFrame(update);
            }
        }
        
        requestAnimationFrame(update);
    }

    function easeOutQuad(t) {
        return t * (2 - t);
    }

    // ========================================
    // 模态框
    // ========================================
    function showLoginModal(type) {
        loginType = type;
        document.getElementById('loginModalTitle').textContent = type === 'admin' ? '管理员登录' : '用户登录';
        document.getElementById('loginModal').classList.add('active');
    }

    function showAddServiceModal() {
        document.getElementById('addServiceForm').reset();
        document.getElementById('addServiceModal').classList.add('active');
    }

    function showUpdateStatusModal(orderId) {
        const order = orders.find(o => o.id === orderId);
        if (!order) return;
        
        document.getElementById('updateOrderId').value = orderId;
        document.getElementById('newStatus').value = order.status;
        document.getElementById('actualPrice').value = order.actualPrice || order.price;
        document.getElementById('adminNote').value = order.adminNote || '';
        document.getElementById('updateStatusModal').classList.add('active');
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
    }

    // ========================================
    // 登录处理
    // ========================================
    function handleLogin() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        
        if (loginType === 'admin') {
            if (username === 'admin' && password === 'admin123') {
                isAdmin = true;
                isLoggedIn = true;
                closeModal('loginModal');
                navigateTo('admin');
                loadAdminOrders();
                showToast('管理员登录成功', 'success');
            } else {
                showToast('用户名或密码错误', 'error');
            }
        } else {
            isLoggedIn = true;
            closeModal('loginModal');
            document.getElementById('loginText').textContent = '已登录';
            showToast('登录成功', 'success');
        }
    }

    function logout() {
        isLoggedIn = false;
        isAdmin = false;
        navigateTo('home');
        document.getElementById('loginText').textContent = '用户登录';
        showToast('已退出登录', 'success');
    }

    // ========================================
    // 服务管理
    // ========================================
    function addService() {
        const name = document.getElementById('serviceName').value;
        const price = parseInt(document.getElementById('servicePrice').value);
        const description = document.getElementById('serviceDesc').value;
        
        const icons = ['fa-laptop-code', 'fa-download', 'fa-broom', 'fa-microchip', 'fa-database', 'fa-shield-virus', 'fa-hdd', 'fa-keyboard'];
        
        const newService = {
            id: services.length + 1,
            name,
            price,
            description,
            icon: icons[Math.floor(Math.random() * icons.length)]
        };
        
        services.push(newService);
        closeModal('addServiceModal');
        loadServices();
        loadServiceOptions();
        loadAdminServices();
        showToast('服务添加成功', 'success');
    }

    function editService(serviceId) {
        const service = services.find(s => s.id === serviceId);
        if (!service) return;
        
        document.getElementById('serviceName').value = service.name;
        document.getElementById('servicePrice').value = service.price;
        document.getElementById('serviceDesc').value = service.description;
        
        services = services.filter(s => s.id !== serviceId);
        
        showAddServiceModal();
    }

    function deleteService(serviceId) {
        if (confirm('确定要删除这个服务项目吗？')) {
            services = services.filter(s => s.id !== serviceId);
            loadServices();
            loadServiceOptions();
            loadAdminServices();
            showToast('服务已删除', 'success');
        }
    }

    // ========================================
    // 订单状态更新
    // ========================================
    function updateOrderStatus() {
        const orderId = document.getElementById('updateOrderId').value;
        const newStatus = document.getElementById('newStatus').value;
        const actualPrice = parseInt(document.getElementById('actualPrice').value) || null;
        const adminNote = document.getElementById('adminNote').value;
        
        const orderIndex = orders.findIndex(o => o.id === orderId);
        if (orderIndex === -1) return;
        
        orders[orderIndex].status = newStatus;
        orders[orderIndex].actualPrice = actualPrice;
        orders[orderIndex].adminNote = adminNote;
        
        closeModal('updateStatusModal');
        loadAdminOrders();
        showToast('订单状态已更新', 'success');
    }

    // ========================================
    // Toast消息
    // ========================================
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        
        toast.className = 'toast ' + type;
        toastMessage.textContent = message;
        
        const icon = toast.querySelector('i');
        icon.className = type === 'success' ? 'fas fa-check-circle' : 
                         type === 'error' ? 'fas fa-times-circle' : 
                         'fas fa-exclamation-circle';
        
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }

    // ========================================
    // 滚动动画
    // ========================================
    function initScrollAnimations() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.animate-on-scroll').forEach(el => {
            el.classList.add('visible');
            observer.observe(el);
        });
    }

    // ========================================
    // 数字动画
    // ========================================
    function initCountAnimation() {
        document.querySelectorAll('.stat-number[data-target]').forEach(el => {
            if (el.dataset.animated) return;
            
            const target = parseInt(el.dataset.target);
            let current = 0;
            const increment = target / 40;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    el.textContent = target;
                    clearInterval(timer);
                } else {
                    el.textContent = Math.floor(current);
                }
            }, 40);
            
            el.dataset.animated = 'true';
        });
    }

    // 点击模态框外部关闭
    document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    });
    </script>
